
name: OpenWrt Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space
        run: |
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /usr/local/.rustup
          sudo docker image prune --all --force
          df -hT

      - name: Set current date
        run: |
          echo "BUILD_TIME=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
          echo "RELEASE_TAG=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget
                   
      - name: Clone OpenWrt
        run: git clone https://github.com/openwrt/openwrt -b openwrt-25.12

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          [ -e config/.config ] && cp config/.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download Packages
        id: download
        run: |
          cd openwrt
          rm -rf packages
          make download V=s -j$(nproc) FIXUP=1
          echo "Pre-downloading packages (this may take 5-10 minutes)..."
        
          # Download with retry logic
          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts..."
          if make download -j8 V=s 2>&1 | tail -50; then
            break
          fi
          ((attempt++))
          [ $attempt -le $max_attempts ] && sleep 10
          done
        
          # Remove incomplete downloads
          find dl -size -1024c -exec rm -f {} \;
        
          echo "✓ Packages downloaded"
          du -sh dl/

      - name: Build Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j2 || make -j1 V=s

      # 2. 准备发布包并为文件添加时间戳
      - name: Prepare Release Bundle
        run: |
          mkdir -p release_dist
          # 找到固件文件，复制并重命名增加时间戳
          find openwrt/bin/targets/ -type f \( -name "*.bin" -o -name "*.img.gz" -o -name "*.manifest" \) | while read -r file; do
            filename=$(basename "$file")
            # 在原文件名前加上时间戳，例如: 202310271200-openwrt-x86-64-generic...
            cp "$file" "release_dist/${{ env.BUILD_TIME }}-$filename"
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware_${{ env.BUILD_TIME }}
          path: release_dist/

      # 3. 自动创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenWrt Build ${{ env.RELEASE_TAG }}
          body: |
            这是由 GitHub Actions 自动编译的固件。
            构建时间：${{ env.BUILD_TIME }}
          files: release_dist/*
