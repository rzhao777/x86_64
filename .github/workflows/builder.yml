name: OpenWrt Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget
          # Note: build-essential is often missing by default on ubuntu-24.04 runners

      - name: Clone OpenWrt
        run: git clone https://github.com/openwrt/openwrt -b openwrt-25.12

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Firmware
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) || make -j1 V=s
          # Falls back to single-thread if multi-core build fails for better error logging

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: openwrt/bin/targets/

      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          run_id: ${{ github.event.workflow_run.id }}
          path: dist

      - name: Prepare release bundle
        run: |
          cd dist
          find . -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
            name="$(basename "$dir")"
            tar -czf "${name}.tar.gz" -C "$dir" .
          done


