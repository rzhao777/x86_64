name: OpenWrt Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget
          # Note: build-essential is often missing by default on ubuntu-24.04 runners

      - name: Clone OpenWrt
        run: git clone https://github.com/openwrt/openwrt -b openwrt-25.12

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Firmware
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) || make -j1 V=s
          # Falls back to single-thread if multi-core build fails for better error logging

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: openwrt/bin/targets/

