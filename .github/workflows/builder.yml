
name: Build OpenWrt x86 AI Router

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Clone OpenWrt
    run: |
      git clone https://github.com/openwrt/openwrt -b openwrt-25.12

  - name: Update Feeds
    run: |
      cd openwrt
      ./scripts/feeds update -a
      ./scripts/feeds install -a

  - name: Copy Config
    run: |
      cp config/.config openwrt/.config
      cp -r files/* openwrt/files/

  - name: Build
    run: |
      cd openwrt
      make defconfig
      make -j$(nproc)
```
