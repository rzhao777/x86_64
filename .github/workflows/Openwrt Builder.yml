name: Openwrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 0 10 * * 6
  
env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_SIZE: 4G
  GOPROXY: https://proxy.golang.org,direct
  NODE_VERSION: "24.x"  # Define Node.js 24 version

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write      
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Maximize Build Space
      run: |
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /usr/local/.rustup
        sudo docker image prune --all --force
        df -hT

    - name: Initialize Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
            autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libz-dev lld llvm lrzsz mkisofs nano \
            ninja-build p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "Build environment ready"

    - name: Install Node.js 24
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'  # Cache npm dependencies for faster builds

    - name: Restore ccache Cache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.ref_name }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-ccache-main-
          ${{ runner.os }}-ccache-

    - name: Restore OpenWrt dl Folder
      uses: actions/cache@v5
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-dl-${{ hashFiles('**/feeds.conf.default', '**/Makefile') }}
        restore-keys: |
          ${{ runner.os }}-dl-${{ github.ref_name }}-
          ${{ runner.os }}-dl-

    - name: Clone OpenWrt Source
      working-directory: /workdir
      run: |
        rm -rf openwrt
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt && echo "Cloned: $(git log -1 --format='%H %s')"

    # Add other steps as per your existing workflow...
