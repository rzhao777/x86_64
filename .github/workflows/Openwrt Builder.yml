name: OpenWrt Builder

on:
  workflow_dispatch:
  repository_dispatch:
  #schedule:
    #- cron: "0 23 * * 6"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPO_URL: https://github.com/openwrt/openwrt
      REPO_BRANCH: openwrt-25.12
      FEEDS_CONF: feeds.conf.default
      CONFIG_FILE: .config
      DIY_P1_SH: diy-part1.sh
      DIY_P2_SH: diy-part2.sh
      UPLOAD_FIRMWARE: true
      UPLOAD_RELEASE: true
      TZ: Asia/Shanghai
      CCACHE_SIZE: 4G
      GOPROXY: https://proxy.golang.org,direct

    steps:
    # ---------------------------------------------------------
    # 1. Checkout
    # ---------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    # ---------------------------------------------------------
    # 2. Install Node.js 24
    # ---------------------------------------------------------
    - name: Install Node.js 24
      uses: actions/setup-node@v5
      with:
        node-version: 24
        check-latest: true

    # ---------------------------------------------------------
    # 3. Free Disk Space
    # ---------------------------------------------------------
    - name: Maximize Build Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /usr/local/.rustup
        sudo docker image prune --all --force
        df -hT

    # ---------------------------------------------------------
    # 4. Install Build Dependencies
    # ---------------------------------------------------------
    - name: Install Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf \
          help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev \
          libssl-dev libtool libz-dev lld llvm lrzsz mkisofs ninja-build p7zip-full patch pkgconf \
          python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c \
          rsync scons squashfs-tools subversion swig texinfo unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo apt-get autoremove -y --purge
        sudo apt-get clean
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # ---------------------------------------------------------
    # 5. Restore Caches
    # ---------------------------------------------------------
    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ github.ref_name }}
        restore-keys: |
          ccache-

    - name: Restore dl Cache
      uses: actions/cache@v5
      with:
        path: /workdir/openwrt/dl
        key: dl-${{ hashFiles('**/feeds.conf.default', '**/Makefile') }}
        restore-keys: |
          dl-

    # ---------------------------------------------------------
    # 6. Clone OpenWrt
    # ---------------------------------------------------------
    - name: Clone OpenWrt Source
      working-directory: /workdir
      run: |
        rm -rf openwrt
        git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt

    # ---------------------------------------------------------
    # 7. Configure ccache
    # ---------------------------------------------------------
    - name: Configure ccache
      run: |
        export CCACHE_DIR=~/.ccache
        mkdir -p $CCACHE_DIR
        ccache -M $CCACHE_SIZE
        ccache -z
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV

    # ---------------------------------------------------------
    # 8. Apply Custom Feeds
    # ---------------------------------------------------------
    - name: Load Custom Feeds
      run: |
        [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && $GITHUB_WORKSPACE/$DIY_P2_SH || echo "✓ No DIY_P2_SH script found"

    - name: Update Feeds
      run: |
        cd /workdir/openwrt
        ./scripts/feeds update -a

    - name: Install Feeds
      run: |
        cd /workdir/openwrt
        ./scripts/feeds install -a

    # ---------------------------------------------------------
    # 9. Apply Patches (Golang/Rust)
    # ---------------------------------------------------------
    - name: Apply 25.12 Patches
      run: |
        cd /workdir/openwrt
        git clone --depth=1 -b master https://github.com/openwrt/packages.git temp
        cp -r temp/lang/golang feeds/packages/lang/golang || true
        cp -r temp/lang/rust feeds/packages/lang/rust || true
        rm -rf temp
        sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile || true

    # ---------------------------------------------------------
    # 10. Load .config and custom scripts
    # ---------------------------------------------------------
    - name: Load Custom Configuration
      run: |
        [ -e files ] && mv files /workdir/openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE /workdir/openwrt/.config
        chmod +x $DIY_P2_SH 2>/dev/null || true
        cd /workdir/openwrt
        [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Apply Defconfig
      run: |
        cd /workdir/openwrt
        make defconfig

    # ---------------------------------------------------------
    # 11. Download Sources
    # ---------------------------------------------------------
    - name: Download Packages
      run: |
        cd /workdir/openwrt
        make download -j$(nproc)
        find dl -size -1024c -delete

    # ---------------------------------------------------------
    # 12. Compile Firmware
    # ---------------------------------------------------------
    - name: Compile Firmware
      id: compile
      run: |
        cd /workdir/openwrt
        export CC="ccache gcc"
        export CXX="ccache g++"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 13. Collect Firmware
    # ---------------------------------------------------------
    - name: Organize Firmware
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p firmware_output
        cp -r /workdir/openwrt/bin/targets/*/*/* firmware_output/ || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/firmware_output" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 14. Upload Artifacts
    # ---------------------------------------------------------
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_Firmware
        path: ${{ env.FIRMWARE }}
        retention-days: 5

    # ---------------------------------------------------------
    # 15. Create Release
    # ---------------------------------------------------------
    - name: Generate Release
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "# OpenWrt Build Report" > release.txt
        echo "Build completed on $(date)" >> release.txt

    # ---------------------------------------------------------
    # 16. Cleanup
    # ---------------------------------------------------------
    - name: Cleanup Old Artifacts
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Cleanup Old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
