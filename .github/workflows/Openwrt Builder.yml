name: Build OpenWRT 25.12 x86_64

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - lite
          - minimal
      release_tag:
        description: 'Release tag (leave empty for auto)'
        required: false
        default: ''
  schedule:
    - cron: '0 18 * * 0' # 每周日 UTC 18:00（北京时间周一 02:00）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_VERSION: "openwrt-25.12"
  TZ: "Asia/Shanghai"
  CCACHE_MAXSIZE: "8G"

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Build OpenWRT 25.12 x86_64 (${{ github.event.inputs.build_type || 'full' }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Freeing disk space ==="
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/.ghcup ~/.cargo 2>/dev/null || true
          sudo snap remove --purge $(snap list 2>/dev/null | awk '/disabled/{print $1}') 2>/dev/null || true
          df -h
      - name: Initialize build environment
        run: |
          echo "=== Installing dependencies ==="
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget curl git jq \
            ccache python3 python3-pip python3-setuptools python3-wheel xz-utils pigz zstd \
            libstdc++-12-dev llvm-dev libclang-dev pkg-config
          pip3 install --break-system-packages setuptools distlib || true
          echo "=== Environment ==="
          echo "OS: $(lsb_release -ds)"
          echo "Kernel: $(uname -r)"
          echo "Python: $(python3 --version)"
          echo "GCC: $(gcc --version | head -1)"
          df -h
      - name: Clone OpenWRT source
        run: |
          git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} \
            https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          echo "OpenWRT: $(git describe --tags --always)"
          echo "Commit: $(git log -1 --format='%h - %s (%cr)')"
          mkdir -p output/{images,packages,logs,manifests}
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          create-symlink: true
          max-size: ${{ env.CCACHE_MAXSIZE }}
          key: openwrt-ccache-${{ env.OPENWRT_VERSION }}-${{ github.event.inputs.build_type || 'full' }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            openwrt-ccache-${{ env.OPENWRT_VERSION }}-${{ github.event.inputs.build_type || 'full' }}-
            openwrt-ccache-${{ env.OPENWRT_VERSION }}-
      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ env.OPENWRT_VERSION }}-${{ github.event.inputs.build_type || 'full' }}-${{ hashFiles('feeds.conf', 'config/*.config') }}
          restore-keys: openwrt-dl-${{ env.OPENWRT_VERSION }}-

      - name: Setup feeds configuration
        run: |
          cd openwrt
          cp ../feeds.conf feeds.conf 2>/dev/null || echo "Warning: feeds.conf not found, using default"
          cat feeds.conf
      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a 2>&1 | tee output/logs/feeds_update.log
          ./scripts/feeds install -a 2>&1 | tee output/logs/feeds_install.log
      - name: Clean old host tools
        run: |
          cd openwrt
          echo "=== Cleaning old host tools to avoid automake/rust conflicts ==="
          rm -rf staging_dir/host build_dir/host tmp 2>/dev/null || true
      - name: Fix Rust host build issues (Critical for 25.12)
        run: |
          cd openwrt
          echo "=== Aggressive Rust + host tools cleanup ==="
          rm -rf build_dir/host/rust* staging_dir/host/build_dir/rust* \
                 build_dir/host/stamp/.rust* feeds/packages/lang/rust/build_dir tmp/* 2>/dev/null || true
          
          echo "=== Preparing host tools (optimized parallelism) ==="
          make -j4 tools/install V=s 2>&1 | tee output/logs/host-tools.log
          
          echo "=== Force Rust host pre-compile ==="
          make -j1 package/feeds/packages/rust/host/compile V=sc 2>&1 | tee output/logs/rust-host.log || true
          echo "✅ Rust host preparation completed"
      - name: Apply configuration
        run: |
          cd openwrt
          BUILD_TYPE="${{ github.event.inputs.build_type || 'full' }}"
          echo "=== Applying config/x86-64-${BUILD_TYPE}.config ==="
          cp ../config/x86-64-${BUILD_TYPE}.config .config || { echo "Config file missing!"; exit 1; }
          make defconfig
          echo "=== Key packages check ==="
          for pkg in passwall geoview sing-box openclash banip; do
            if grep -q "^CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✓ $pkg enabled"
            else
              echo "✗ $pkg not enabled"
            fi
          done
          echo "=== Saving config summary ==="
          grep -E '^CONFIG_(TARGET|PACKAGE_)' .config | head -100 > output/logs/config.summary || true
    
      - name: Download sources
        run: |
          cd openwrt
          echo "=== Downloading sources ==="
          make download -j12 2>&1 | tee output/logs/download.log
      - name: Build firmware
        run: |
          cd openwrt
          echo "=== Step 1: Build Toolchain & Essential Host Tools ==="
          # Use -j1 for the most sensitive part to avoid race conditions
          make -j1 tools/install V=s || make -j1 tools/install V=s
          
          echo "=== Step 2: Build Go & Rust Compilers ==="
          # Force compile the languages that often cause 'Error 2'
          make -j1 package/feeds/packages/golang/host/compile V=s
          
          echo "=== Step 3: Full Build ==="
          # Now that the environment is locked in, use parallel cores
          make -j$(nproc) V=s > >(tee -a output/logs/build.log) 2>&1
          
          BUILD_STATUS=$?
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build FAILED! Retrying with single thread for debug..."
            make -j1 V=s >> output/logs/build.log 2>&1
            exit 1
          fi
      - name: Organize artifacts
        run: |
          cd openwrt
          echo "=== Organizing artifacts ==="
          cp bin/targets/x86/64/openwrt-x86-64-generic-*.img.gz output/images/ 2>/dev/null || true
          cp bin/targets/x86/64/*.iso* output/images/ 2>/dev/null || true
          cp bin/targets/x86/64/*.vmdk* output/images/ 2>/dev/null || true
          cp bin/targets/x86/64/Packages* output/packages/ 2>/dev/null || true
          cp bin/targets/x86/64/*.manifest output/manifests/ 2>/dev/null || true
          
          cd output
          cat > BUILD_INFO << EOF
          ═══════════════════════════════════════
             OpenWRT 25.12 x86_64 Build Info
          ═══════════════════════════════════════
          Build Date: $(date '+%Y-%m-%d %H:%M:%S %Z')
          OpenWRT Version: ${{ env.OPENWRT_VERSION }}
          Build Type: ${{ github.event.inputs.build_type || 'full' }}
          Runner: Ubuntu 24.04 GitHub Actions
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          EOF
          ls -lh images/*.gz 2>/dev/null >> BUILD_INFO || true
          echo "Build completed!"
      - name: Generate checksums
        run: |
          cd openwrt/output/images
          sha256sum *.gz > sha256sums.txt 2>/dev/null || true
          cat sha256sums.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-${{ github.event.inputs.build_type || 'full' }}-${{ github.run_number }}
          path: openwrt/output/
          retention-days: 14   # full 可适当缩短，节省空间

      - name: Create release (Full only)
        if: (github.event.inputs.build_type == 'full' || github.event.inputs.build_type == '') && github.event_name != 'schedule'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: OpenWRT 25.12 x86_64 - ${{ github.event.inputs.build_type || 'Full' }}
          tag_name: ${{ github.event.inputs.release_tag || format('v25.12-{0}', github.run_number) }}
          body_path: openwrt/output/BUILD_INFO
          files: |
            openwrt/output/images/*.gz
            openwrt/output/images/sha256sums.txt
            openwrt/output/BUILD_INFO
          draft: false
          prerelease: false

      - name: Clean up
        if: always()
        run: |
          echo "=== Cleaning up ==="
          sudo rm -rf openwrt/build_dir openwrt/staging_dir openwrt/tmp 2>/dev/null || true
          df -h
  notify:
    name: Send Notification
    needs: build
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Telegram Notification (optional)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            OpenWRT 25.12 Build Finished
            Type: ${{ github.event.inputs.build_type || 'full' }}
            Status: ${{ needs.build.result }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            请检查 artifact 或 release（如果是 full）
