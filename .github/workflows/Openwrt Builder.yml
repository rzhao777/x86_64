name: OpenWrt Matrix Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 6"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: "x86", sub: "64", device: "generic" }
          - { arch: "ramips", sub: "mt7621", device: "xiaomi_mi-router-4a-gigabit" }
          - { arch: "ath79", sub: "generic", device: "tplink_archer-c7-v5" }

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPO_URL: https://github.com/openwrt/openwrt
      REPO_BRANCH: openwrt-25.12
      CCACHE_SIZE: 4G
      TZ: Asia/Shanghai

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Node.js 24
      uses: actions/setup-node@v5
      with:
        node-version: 24
        check-latest: true

    - name: Maximize Build Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /usr/local/.rustup
        sudo docker image prune --all --force
        df -hT

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf \
          help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev \
          libssl-dev libtool libz-dev lld llvm lrzsz mkisofs ninja-build p7zip-full patch pkgconf \
          python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c \
          rsync scons squashfs-tools subversion swig texinfo unzip vim wget xmlto xxd zlib1g-dev zstd

    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ matrix.target.arch }}-${{ matrix.target.sub }}

    - name: Clone OpenWrt
      run: |
        git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Configure ccache
      run: |
        export CCACHE_DIR=~/.ccache
        mkdir -p $CCACHE_DIR
        ccache -M $CCACHE_SIZE
        ccache -z
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV

    - name: Configure Target
      run: |
        cd openwrt
        cat > .config <<EOF
        CONFIG_TARGET_${{ matrix.target.arch }}=y
        CONFIG_TARGET_${{ matrix.target.arch }}_${{ matrix.target.sub }}=y
        CONFIG_TARGET_${{ matrix.target.arch }}_${{ matrix.target.sub }}_DEVICE_${{ matrix.target.device }}=y
        EOF
        make defconfig

    - name: Update Feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install Feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Download Sources
      run: cd openwrt && make download -j$(nproc)

    - name: Compile Firmware
      run: |
        cd openwrt
        export CC="ccache gcc"
        export CXX="ccache g++"
        make -j$(nproc) || make -j1 V=s

    - name: Collect Firmware
      run: |
        mkdir -p firmware_output
        cp -r openwrt/bin/targets/${{ matrix.target.arch }}/${{ matrix.target.sub }}/* firmware_output/

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_${{ matrix.target.arch }}_${{ matrix.target.sub }}_${{ matrix.target.device }}
        path: firmware_output
        retention-days: 5
