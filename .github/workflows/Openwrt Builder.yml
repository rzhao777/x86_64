name: Build OpenWrt 25.12 Smart Router

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt -b openwrt-25.12
        cd openwrt

    - name: Feeds update
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy config
      run: |
        cp ../config/.config openwrt/.config

    - name: Compile
      run: |
        cd openwrt
        make defconfig
        make -j$(nproc)
