name: Build OpenWRT 25.12 x86_64

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - lite
          - minimal
      release_tag:
        description: 'Release tag (leave empty for auto)'
        required: false
        default: ''
  schedule:
    - cron: '0 18 * * 0'   # 每周日 UTC 18:00（北京时间周一 02:00）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_VERSION: "openwrt-25.12"
  TZ: "Asia/Shanghai"
  CCACHE_MAXSIZE: "8G"

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Build OpenWRT 25.12 x86_64 (${{ github.event.inputs.build_type || 'full' }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Freeing disk space ==="
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo snap remove --purge $(snap list 2>/dev/null | awk '/disabled/{print $1}') 2>/dev/null || true
          df -h

      - name: Initialize build environment
        run: |
          echo "=== Installing dependencies ==="
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget curl git jq \
            ccache python3 python3-pip python3-setuptools python3-wheel xz-utils pigz zstd

          pip3 install --break-system-packages setuptools distlib || true

          echo "=== Environment ==="
          echo "OS: $(lsb_release -ds)"
          echo "Kernel: $(uname -r)"
          echo "Python: $(python3 --version)"
          echo "GCC: $(gcc --version | head -1)"
          df -h

      - name: Clone OpenWRT source
        run: |
          git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} \
            https://github.com/openwrt/openwrt.git openwrt

          cd openwrt
          echo "OpenWRT: $(git describe --tags --always)"
          echo "Commit: $(git log -1 --format='%h - %s (%cr)')"
          mkdir -p output/{images,packages,logs,manifests}

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          create-symlink: true
          max-size: ${{ env.CCACHE_MAXSIZE }}
          key: openwrt-ccache-${{ env.OPENWRT_VERSION }}
          restore-keys: openwrt-ccache-${{ env.OPENWRT_VERSION }}-

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ env.OPENWRT_VERSION }}-${{ hashFiles('feeds.conf', 'config/*.config') }}
          restore-keys: openwrt-dl-${{ env.OPENWRT_VERSION }}-

      - name: Setup feeds configuration
        run: |
          cd openwrt
          cp ../feeds.conf feeds.conf 2>/dev/null || echo "Warning: feeds.conf not found, using default"
          cat feeds.conf

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a 2>&1 | tee output/logs/feeds_update.log
          ./scripts/feeds install -a 2>&1 | tee output/logs/feeds_install.log

      - name: Clean old host tools (fix automake issues)
        run: |
          cd openwrt
          echo "=== Cleaning old host tools to avoid automake 1.18 conflicts ==="
          rm -rf staging_dir/host build_dir/host 2>/dev/null || true

      - name: Prepare host tools (low parallelism)
        run: |
          cd openwrt
          echo "=== Preparing host tools (automake, autoconf, etc.) with -j2 ==="
          make -j2 tools/install V=s 2>&1 | tee output/logs/host-tools.log

      - name: Apply configuration
        run: |
          cd openwrt
          BUILD_TYPE="${{ github.event.inputs.build_type || 'full' }}"
          echo "=== Applying config/x86-64-${BUILD_TYPE}.config ==="
          cp ../config/x86-64-${BUILD_TYPE}.config .config || { echo "Config file missing!"; exit 1; }

          make defconfig

          echo "=== Key packages check ==="
          for pkg in passwall geoview sing-box openclash banip; do
            if grep -q "^CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✓ $pkg enabled"
            else
              echo "✗ $pkg not enabled"
            fi
          done

      - name: Download sources
        run: |
          cd openwrt
          echo "=== Downloading sources ==="
          make download -j4 2>&1 | tee output/logs/download.log

      - name: Build firmware
        run: |
          cd openwrt
          echo "=== Build started at $(date '+%Y-%m-%d %H:%M:%S') ==="

          # 使用 -j2 保证稳定，详细日志只写入文件
          make -j2 > >(tee -a output/logs/build.log) 2>&1

          BUILD_STATUS=$?
          echo "=== Build finished at $(date '+%Y-%m-%d %H:%M:%S') ==="

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build FAILED!"
            echo "=== Last 500 lines of build.log ==="
            tail -n 500 output/logs/build.log
            exit 1
          fi

          echo "✅ Build successful!"
          ls -lh bin/targets/x86/64/*.img.gz 2>/dev/null || echo "Warning: No image found"

      - name: Organize artifacts
        run: |
          cd openwrt
          echo "=== Organizing artifacts ==="
          cp bin/targets/x86/64/openwrt-x86-64-generic-*.img.gz output/images/ 2>/dev/null || true
          cp bin/targets/x86/64/*.iso* output/images/ 2>/dev/null || true
          cp bin/targets/x86/64/*.vmdk* output/images/ 2>/dev/null || true

          cp bin/targets/x86/64/Packages* output/packages/ 2>/dev/null || true
          cp bin/targets/x86/64/*.manifest output/manifests/ 2>/dev/null || true

          cd output
          cat > BUILD_INFO << EOF
          ═══════════════════════════════════════
             OpenWRT 25.12 x86_64 Build Info
          ═══════════════════════════════════════

          Build Date: $(date '+%Y-%m-%d %H:%M:%S %Z')
          OpenWRT Version: ${{ env.OPENWRT_VERSION }}
          Build Type: ${{ github.event.inputs.build_type || 'full' }}
          Runner: Ubuntu 24.04 GitHub Actions
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          EOF

          ls -lh images/*.gz 2>/dev/null >> BUILD_INFO || true
          echo "Build completed!"

      - name: Generate checksums
        run: |
          cd openwrt/output/images
          sha256sum *.gz > sha256sums.txt 2>/dev/null || true
          cat sha256sums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-${{ github.event.inputs.build_type || 'full' }}-${{ github.run_number }}
          path: openwrt/output/
          retention-days: 30

      - name: Create release (Full only)
        if: github.event.inputs.build_type == 'full' || github.event.inputs.build_type == ''
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: OpenWRT 25.12 x86_64 - ${{ github.event.inputs.build_type || 'Full' }}
          tag_name: ${{ github.event.inputs.release_tag || format('v25.12-{0}', github.run_number) }}
          body_path: openwrt/output/BUILD_INFO
          files: |
            openwrt/output/images/*.gz
            openwrt/output/images/sha256sums.txt
            openwrt/output/BUILD_INFO
          draft: false
          prerelease: false

      - name: Clean up
        if: always()
        run: |
          echo "=== Cleaning up ==="
          sudo rm -rf openwrt/build_dir openwrt/staging_dir openwrt/tmp 2>/dev/null || true
          df -h

  notify:
    name: Send Notification
    needs: build
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Telegram Notification (optional)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            OpenWRT 25.12 Build Finished
            Type: ${{ github.event.inputs.build_type || 'full' }}
            Status: ${{ needs.build.result }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
