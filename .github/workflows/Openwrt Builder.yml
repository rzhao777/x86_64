name: Build OpenWRT 25.12 x86_64

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - lite
          - minimal
      release_tag:
        description: 'Release tag (leave empty for auto)'
        required: false
        default: ''
  schedule:
    - cron: '0 18 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_VERSION: "main" # 25.12 目前处于 main/master 分支
  TZ: "Asia/Shanghai"
  CCACHE_MAXSIZE: "10G"

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Build OpenWRT 25.12 (${{ github.event.inputs.build_type || 'full' }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/.ghcup ~/.cargo
          sudo docker image prune -a -f
          sudo apt-get clean
          df -h

      - name: Initialize build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget curl git jq \
            ccache python3 python3-pip python3-setuptools python3-wheel xz-utils pigz zstd \
            libstdc++-12-dev llvm-dev libclang-dev pkg-config libelf-dev bc
          echo "=== Environment Info ==="
          gcc --version | head -n 1
          python3 --version

      - name: Clone OpenWRT source
        run: |
          git clone --depth 1 https://github.com openwrt
          cd openwrt
          mkdir -p output/{images,packages,logs}

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          create-symlink: true
          max-size: ${{ env.CCACHE_MAXSIZE }}
          key: openwrt-ccache-${{ github.run_id }}
          restore-keys: |
            openwrt-ccache-

      - name: Update and install feeds
        run: |
          cd openwrt
          [ -f ../feeds.conf ] && cp ../feeds.conf feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Fix GNULIB & Host tools (Critical for 25.12)
        run: |
          cd openwrt
          # 彻底清理旧 host 工具，防止 unistd.h 冲突
          rm -rf staging_dir/host build_dir/host tmp
          
          echo "=== Step 1: Pre-compile essential tools (Single thread) ==="
          make tools/m4/compile -j1 V=s
          make tools/bison/compile -j1 V=s
          
          echo "=== Step 2: Compile Rust host toolchain ==="
          # 25.12 依赖 Rust，单独编译防止并发死锁
          make tools/rust/compile -j1 V=s || true
          
          echo "=== Step 3: Install all host tools ==="
          make tools/install -j$(nproc) V=s || make tools/install -j1 V=s

      - name: Apply configuration
        run: |
          cd openwrt
          BUILD_TYPE="${{ github.event.inputs.build_type || 'full' }}"
          [ -f ../config/x86-64-${BUILD_TYPE}.config ] && cp ../config/x86-64-${BUILD_TYPE}.config .config || make defconfig
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j16

      - name: Build firmware
        run: |
          cd openwrt
          # 25.12 建议初次编译使用 -j2 或 -j4，平衡 Rust 的内存消耗
          make -j$(nproc) V=s || make -j1 V=s
          
      - name: Organize artifacts
        if: success()
        run: |
          cd openwrt
          cp bin/targets/x86/64/*.img.gz output/images/ 2>/dev/null || true
          cp bin/targets/x86/64/*.manifest output/images/ 2>/dev/null || true
          echo "Build Tag: ${{ github.event.inputs.release_tag || 'Auto-Build' }}" > output/images/BUILD_INFO
          echo "Date: $(date)" >> output/images/BUILD_INFO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWRT_25.12_x86_64_${{ github.run_number }}
          path: openwrt/output/images/

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('v25.12-{0}', github.run_number) }}
          files: openwrt/output/images/*
          token: ${{ secrets.GITHUB_TOKEN }}
