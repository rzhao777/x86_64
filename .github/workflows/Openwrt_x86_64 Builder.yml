name: OpenWrt Builder

on:
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: "0 23 * * 6"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    env:
      REPO_URL: https://github.com/openwrt/openwrt
      REPO_BRANCH: openwrt-25.12
      FEEDS_CONF: feeds.conf.default
      CONFIG_FILE: .config
      DIY_P1_SH: diy-part1.sh
      DIY_P2_SH: diy-part2.sh
      UPLOAD_FIRMWARE: true
      UPLOAD_RELEASE: true
      TZ: Asia/Shanghai
      CCACHE_SIZE: 4G
      GOPROXY: https://proxy.golang.org,direct

    steps:
    # ---------------------------------------------------------
    # 1. Checkout
    # ---------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    # ---------------------------------------------------------
    # 2. Free Disk Space
    # ---------------------------------------------------------
    - name: Maximize Build Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /usr/local/.rustup
        sudo docker image prune --all --force
        df -hT

    # ---------------------------------------------------------
    # 3. Install Build Dependencies
    # ---------------------------------------------------------
    - name: Install Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf \
          help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev \
          libssl-dev libtool libz-dev lld llvm lrzsz mkisofs ninja-build p7zip-full patch pkgconf \
          python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c \
          rsync scons squashfs-tools subversion swig texinfo unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo apt-get autoremove -y --purge
        sudo apt-get clean
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # ---------------------------------------------------------
    # 4. Restore ccache
    # ---------------------------------------------------------
    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ github.ref_name }}
        restore-keys: |
          ccache-

    # ---------------------------------------------------------
    # 5. Clone OpenWrt
    # ---------------------------------------------------------
    - name: Clone OpenWrt Source
      working-directory: /workdir
      run: |
        git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt

    # ---------------------------------------------------------
    # 6. Configure ccache
    # ---------------------------------------------------------
    - name: Configure ccache
      run: |
        export CCACHE_DIR=~/.ccache
        mkdir -p $CCACHE_DIR
        ccache -M $CCACHE_SIZE
        ccache -z
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV

    # ---------------------------------------------------------
    # 7. Apply Custom Feeds
    # ---------------------------------------------------------
    - name: Load Custom Feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF /workdir/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH 2>/dev/null || true
        cd /workdir/openwrt
        [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update Feeds
      run: |
        cd /workdir/openwrt
        ./scripts/feeds update -a

    - name: Install Feeds
      run: |
        cd /workdir/openwrt
        ./scripts/feeds install -a

    # ---------------------------------------------------------
    # 8. Apply Patches
    # ---------------------------------------------------------
    - name: Apply 25.12 Patches
      run: |
        cd /workdir/openwrt
        git clone --depth=1 -b master https://github.com/openwrt/packages.git temp
        cp -r temp/lang/golang feeds/packages/lang/golang || true
        cp -r temp/lang/rust feeds/packages/lang/rust || true
        rm -rf temp
        sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile || true

    # ---------------------------------------------------------
    # 9. Load .config
    # ---------------------------------------------------------
    - name: Load Custom Configuration
      run: |
        [ -e files ] && mv files /workdir/openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE /workdir/openwrt/.config
        chmod +x $DIY_P2_SH 2>/dev/null || true
        cd /workdir/openwrt
        [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Apply Defconfig
      run: |
        cd /workdir/openwrt
        make defconfig

    # ---------------------------------------------------------
    # 10. Download Sources
    # ---------------------------------------------------------
    - name: Download Packages
      run: |
        cd /workdir/openwrt
        make download -j$(nproc)
        find dl -size -1024c -delete

    # ---------------------------------------------------------
    # 11. Compile Firmware
    # ---------------------------------------------------------
    - name: Compile Firmware
      id: compile
      run: |
        cd /workdir/openwrt
        export CC="ccache gcc"
        export CXX="ccache g++"
        export MAKEFLAGS="-j$(nproc)"
        mkdir -p logs
        make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s
        make -j$(nproc) V=sc | tee logs/build.log || make -j1 V=s | tee logs/build-fail.log
        echo "status=success" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 12. Debug Logs on Failure
    # ---------------------------------------------------------
    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Build_Logs
        path: |
          /workdir/openwrt/logs
          /workdir/openwrt/.config
          /workdir/openwrt/tmp/.*
        retention-days: 3

    # ---------------------------------------------------------
    # 13. Organize Firmware
    # ---------------------------------------------------------
    - name: Organize Firmware
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p firmware_output
        cp -r /workdir/openwrt/bin/targets/*/*/* firmware_output/ || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/firmware_output" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 14. Rename Firmware + SHA256 + Release Notes
    # ---------------------------------------------------------
    - name: Rename Firmware Files
      run: |
        cd firmware_output
        for f in *; do
          if [[ -f "$f" ]]; then
            NEW="OpenWrt-x86_64-$(date +%Y%m%d)-${f}"
            mv "$f" "$NEW"
          fi
        done

    - name: Generate SHA256 Checksums
      run: |
        cd firmware_output
        sha256sum * > SHA256SUMS

    - name: Generate Release Notes
      id: release_notes
      run: |
        BUILD_TIME=$(date +"%Y-%m-%d %H:%M:%S")
        COMMIT_HASH=$(cd /workdir/openwrt && git rev-parse HEAD)
        TARGET=$(ls /workdir/openwrt/bin/targets)
        SUBTARGET=$(ls /workdir/openwrt/bin/targets/$TARGET)

        echo "## OpenWrt Build Report" > release.txt
        echo "" >> release.txt
        echo "**Build Time:** $BUILD_TIME" >> release.txt
        echo "**Commit:** $COMMIT_HASH" >> release.txt
        echo "**Target:** $TARGET / $SUBTARGET" >> release.txt
        echo "**Firmware Files:**" >> release.txt
        ls -lh firmware_output | sed 's/^/- /' >> release.txt

    # ---------------------------------------------------------
    # 15. Upload Firmware
    # ---------------------------------------------------------
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_Firmware
        path: ${{ env.FIRMWARE }}
        retention-days: 5

    # ---------------------------------------------------------
    # 16. Telegram Notification
    # ---------------------------------------------------------
    - name: Telegram Notification
      if: always()
      run: |
        STATUS="✅ Build Success"
        if [ '${{ job.status }}' != 'success' ]; then
          STATUS="❌ Build Failed"
        fi
        TEXT="$STATUS%0ARepo: $GITHUB_REPOSITORY%0ARun: $GITHUB_RUN_NUMBER%0ACommit: $GITHUB_SHA"
        curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="$TEXT"

    # ---------------------------------------------------------
    # 17. Discord Notification
    # ---------------------------------------------------------
    - name: Discord Notification
      if: always()
      run: |
        STATUS="Build Success"
        if [ '${{ job.status }}' != 'success' ]; then
          STATUS="Build Failed"
        fi
        CONTENT="$STATUS\nRepo: $GITHUB_REPOSITORY\nRun: $GITHUB_RUN_NUMBER\nCommit: $GITHUB_SHA"
        curl -H "Content-Type: application/json" \
          -d "{\"content\": \"${CONTENT}\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"

